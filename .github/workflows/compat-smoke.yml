name: Wrapper CI + LeRobot Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: PYTHONPYCACHEPREFIX=.pycache python -m pytest

      - name: Run ruff
        run: python -m ruff check .

      - name: Run mypy
        run: |
          python -m mypy \
            robot_pipeline_app/cli_modes.py \
            robot_pipeline_app/compat.py \
            robot_pipeline_app/compat_policy.py \
            robot_pipeline_app/compat_snapshot.py \
            robot_pipeline_app/runner.py \
            robot_pipeline_app/support_bundle.py

  lerobot-validated-track-smoke:
    name: LeRobot Validated-Track Smoke
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . packaging pyyaml

      - name: Resolve validated LeRobot versions
        run: |
          python - <<'PY' > /tmp/lerobot_versions.txt
          import json
          import urllib.request
          from packaging.version import Version, InvalidVersion
          from robot_pipeline_app.compat_policy import VALIDATED_LEROBOT_TRACKS

          with urllib.request.urlopen("https://pypi.org/pypi/lerobot/json", timeout=20) as resp:
              payload = json.load(resp)

          versions = []
          for raw in payload.get("releases", {}).keys():
              try:
                  ver = Version(raw)
              except InvalidVersion:
                  continue
              if ver.is_prerelease:
                  continue
              versions.append(ver)

          versions = sorted(set(versions), reverse=True)
          for track in VALIDATED_LEROBOT_TRACKS:
              prefix = track.version_spec.removesuffix(".x")
              matching = [
                  ver for ver in versions
                  if str(ver) == prefix or str(ver).startswith(prefix + ".")
              ]
              if not matching:
                  raise SystemExit(f"No stable lerobot release found for validated track {track.version_spec}")
              print(f"{track.key}\t{track.version_spec}\t{matching[0]}")
          PY
          cat /tmp/lerobot_versions.txt

      - name: Run compat/doctor smoke across validated tracks
        run: |
          set -euo pipefail
          cat > /tmp/validate_smoke.py <<'PY'
          import json
          import sys

          version = sys.argv[1]
          compat_path = sys.argv[2]
          doctor_path = sys.argv[3]

          with open(compat_path, "r", encoding="utf-8") as f:
              compat = json.load(f)
          with open(doctor_path, "r", encoding="utf-8") as f:
              doctor = json.load(f)

          caps = compat.get("capabilities", {})
          for key in ("record_entrypoint", "train_entrypoint", "teleop_entrypoint", "calibrate_entrypoint"):
              if not caps.get(key):
                  raise SystemExit(f"{key} missing for lerobot {version}")
          if caps.get("lerobot_version") in {"", "unknown", None}:
              raise SystemExit(f"lerobot_version unresolved for lerobot {version}")
          if not isinstance(caps.get("validated_tracks"), list) or not caps["validated_tracks"]:
              raise SystemExit(f"validated_tracks missing for lerobot {version}")
          if caps.get("record_help_available") is not True:
              raise SystemExit(f"record_help_available was not true for lerobot {version}")
          if caps.get("train_help_available") is not True:
              raise SystemExit(f"train_help_available was not true for lerobot {version}")
          if not isinstance(caps.get("supported_record_flags"), list):
              raise SystemExit(f"supported_record_flags missing for lerobot {version}")
          if not isinstance(caps.get("supported_train_flags"), list):
              raise SystemExit(f"supported_train_flags missing for lerobot {version}")
          if not isinstance(caps.get("missing_train_flags"), list):
              raise SystemExit(f"missing_train_flags missing for lerobot {version}")
          if not caps["supported_record_flags"]:
              raise SystemExit(f"supported_record_flags empty for lerobot {version}")
          if not caps["supported_train_flags"]:
              raise SystemExit(f"supported_train_flags empty for lerobot {version}")

          check_names = {item.get("name") for item in compat.get("checks", []) if isinstance(item, dict)}
          for name in ("Train entrypoint", "Train flags", "Workflow validation gate"):
              if name not in check_names:
                  raise SystemExit(f"{name} check missing for lerobot {version}")

          if doctor.get("diagnostic_version") != "v2":
              raise SystemExit(f"doctor JSON schema unexpected for lerobot {version}")
          summary = doctor.get("summary", {})
          if not isinstance(summary.get("fail_count"), int):
              raise SystemExit(f"doctor summary missing fail_count for lerobot {version}")
          PY

          while IFS=$'\t' read -r TRACK_KEY TRACK_SPEC RESOLVED_VER; do
            echo "::group::LeRobot ${TRACK_SPEC} -> ${RESOLVED_VER} smoke"
            python -m pip uninstall -y lerobot >/dev/null 2>&1 || true
            python -m pip install "lerobot==${RESOLVED_VER}"

            PYTHONPYCACHEPREFIX=.pycache python robot_pipeline.py compat --json > "compat-${TRACK_KEY}-${RESOLVED_VER}.json"
            PYTHONPYCACHEPREFIX=.pycache python robot_pipeline.py doctor --json > "doctor-${TRACK_KEY}-${RESOLVED_VER}.json"
            python /tmp/validate_smoke.py \
              "${RESOLVED_VER}" \
              "compat-${TRACK_KEY}-${RESOLVED_VER}.json" \
              "doctor-${TRACK_KEY}-${RESOLVED_VER}.json"
            echo "::endgroup::"
          done < /tmp/lerobot_versions.txt

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lerobot-smoke-reports
          path: |
            compat-*.json
            doctor-*.json
            /tmp/lerobot_versions.txt
